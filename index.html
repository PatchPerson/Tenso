<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tenso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Geist';
      src: url('/fonts/GeistVariable.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --bg-primary: #16161e;
      --bg-secondary: #1a1b26;
      --bg-tertiary: #24283b;
      --bg-surface: #1f2335;
      --bg-hover: #292e42;
      --bg-active: #33384f;
      --text-primary: #c0caf5;
      --text-secondary: #a9b1d6;
      --text-muted: #565f89;
      --text-dim: #3b4261;
      --border: #292e42;
      --border-subtle: #1f2335;
      --accent: #d4a853;
      --accent-hover: #e0bb6a;
      --accent-dim: rgba(212, 168, 83, 0.12);
      --accent-glow: rgba(212, 168, 83, 0.25);
      --success: #9ece6a;
      --success-dim: rgba(158, 206, 106, 0.12);
      --warning: #e0af68;
      --warning-dim: rgba(224, 175, 104, 0.12);
      --error: #f7768e;
      --error-dim: rgba(247, 118, 142, 0.12);
      --method-get: #9ece6a;
      --method-get-bg: rgba(158, 206, 106, 0.10);
      --method-post: #e0af68;
      --method-post-bg: rgba(224, 175, 104, 0.10);
      --method-put: #7aa2f7;
      --method-put-bg: rgba(122, 162, 247, 0.10);
      --method-delete: #f7768e;
      --method-delete-bg: rgba(247, 118, 142, 0.10);
      --method-patch: #bb9af7;
      --method-patch-bg: rgba(187, 154, 247, 0.10);
      --method-head: #73daca;
      --method-head-bg: rgba(115, 218, 202, 0.10);
      --method-options: #ff9e64;
      --method-options-bg: rgba(255, 158, 100, 0.10);
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
      --shadow-glow: 0 0 20px var(--accent-glow);
      --transition-fast: 120ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg-primary: #f0f0f5;
      --bg-secondary: #e8e8f0;
      --bg-tertiary: #d8d8e4;
      --bg-surface: #e0e0ec;
      --bg-hover: #d0d0de;
      --bg-active: #c4c4d6;
      --text-primary: #343b58;
      --text-secondary: #4c505e;
      --text-muted: #8b8fa8;
      --text-dim: #b0b4c8;
      --border: #d0d0de;
      --border-subtle: #e0e0ec;
      --accent: #b8860b;
      --accent-hover: #cc9a1d;
      --accent-dim: rgba(184, 134, 11, 0.08);
      --accent-glow: rgba(184, 134, 11, 0.15);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { height: 100vh; display: flex; flex-direction: column; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    ::-webkit-scrollbar-corner { background: transparent; }

    input, textarea, select, button { font-family: inherit; }
    button { cursor: pointer; }

    ::selection {
      background: var(--accent-dim);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <script>

      var themes = {

        'cyberpunk':{'--bg-primary':'#0a0a12','--bg-secondary':'#0e0e1a','--bg-tertiary':'#1a1a2e','--bg-surface':'#131322','--bg-hover':'#222240','--bg-active':'#2a2a4e','--text-primary':'#e0f0ff','--text-secondary':'#a0c4e8','--text-muted':'#5570a0','--text-dim':'#3a4a70','--border':'#1a1a2e','--border-subtle':'#131322','--accent':'#00f0ff','--accent-hover':'#40f8ff','--accent-dim':'rgba(0,240,255,0.10)','--accent-glow':'rgba(0,240,255,0.30)'},

        'kanagawa':{'--bg-primary':'#1f1f28','--bg-secondary':'#1a1a22','--bg-tertiary':'#2a2a37','--bg-surface':'#232330','--bg-hover':'#32323f','--bg-active':'#3a3a4a','--text-primary':'#dcd7ba','--text-secondary':'#c8c093','--text-muted':'#727169','--text-dim':'#54546d','--border':'#2a2a37','--border-subtle':'#232330','--accent':'#7e9cd8','--accent-hover':'#9cb4e4','--accent-dim':'rgba(126,156,216,0.12)','--accent-glow':'rgba(126,156,216,0.25)'}

      var t = themes[key];
      if (!t) return;
      var s = document.documentElement.style;
      for (var k in t) s.setProperty(k, t[k]);
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
