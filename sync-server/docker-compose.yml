version: "3.8"

services:
  sync-server:
    build:
      context: ..
      dockerfile: sync-server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_PATH=/data/reqlite-sync.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - TEAM_KEY=${TEAM_KEY:-}
    volumes:
      - sync-data:/data
    restart: unless-stopped

volumes:
  sync-data:
