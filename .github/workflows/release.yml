name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy-convex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bunx convex deploy --cmd 'echo skip'
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  build:
    needs: deploy-convex
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos
          - os: windows-latest
            target: ''
            label: windows
          - os: ubuntu-22.04
            target: ''
            label: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.label == 'macos' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: ${{ matrix.label }}
          cache-on-failure: true

      - name: Create .env.production
        shell: bash
        run: |
          echo "VITE_CONVEX_URL=${{ secrets.VITE_CONVEX_URL }}" >> .env.production
          echo "VITE_CONVEX_SITE_URL=${{ secrets.VITE_CONVEX_SITE_URL }}" >> .env.production

      - name: Build Tauri app
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            bun run tauri build -- --target ${{ matrix.target }}
          else
            bun run tauri build
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS artifacts
        if: matrix.label == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload Windows artifacts
        if: matrix.label == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

      - name: Upload Linux artifacts
        if: matrix.label == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="PatchPerson/Tenso"
          BASE="https://github.com/${REPO}/releases/download/v${VERSION}"

          # Read signatures
          MACOS_SIG=$(cat artifacts/*.app.tar.gz.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat artifacts/*.AppImage.sig 2>/dev/null || echo "")
          WINDOWS_MSI_SIG=$(cat artifacts/*.msi.sig 2>/dev/null || echo "")
          WINDOWS_NSIS_SIG=$(cat artifacts/*.exe.sig 2>/dev/null || echo "")

          # Get artifact filenames
          MACOS_FILE=$(ls artifacts/*.app.tar.gz 2>/dev/null | head -1 | xargs basename || echo "")
          LINUX_FILE=$(ls artifacts/*.AppImage 2>/dev/null | head -1 | xargs basename || echo "")
          WINDOWS_MSI_FILE=$(ls artifacts/*.msi 2>/dev/null | head -1 | xargs basename || echo "")
          WINDOWS_NSIS_FILE=$(ls artifacts/*.exe 2>/dev/null | head -1 | xargs basename || echo "")

          # Build latest.json
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg macos_url "${BASE}/${MACOS_FILE}" \
            --arg macos_sig "$MACOS_SIG" \
            --arg linux_url "${BASE}/${LINUX_FILE}" \
            --arg linux_sig "$LINUX_SIG" \
            --arg windows_msi_url "${BASE}/${WINDOWS_MSI_FILE}" \
            --arg windows_msi_sig "$WINDOWS_MSI_SIG" \
            --arg windows_nsis_url "${BASE}/${WINDOWS_NSIS_FILE}" \
            --arg windows_nsis_sig "$WINDOWS_NSIS_SIG" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { url: $macos_url, signature: $macos_sig },
                "linux-x86_64": { url: $linux_url, signature: $linux_sig },
                "windows-x86_64": { url: $windows_nsis_url, signature: $windows_nsis_sig }
              }
            }' > artifacts/latest.json

      - name: Generate AI changelog
        id: changelog
        shell: bash
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        run: |
          chmod +x scripts/generate-changelog.sh
          CHANGELOG=$(./scripts/generate-changelog.sh "${{ steps.version.outputs.version }}")
          echo "$CHANGELOG" > changelog.md
          echo "Changelog generated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          draft: true
          body_path: changelog.md
          files: |
            artifacts/*.dmg
            artifacts/*.app.tar.gz
            artifacts/*.msi
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/latest.json
